name: Zero Downtime CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build-and-push:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build Spring Boot Project
        run: ./mvnw clean package -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/zero-downtime-api:latest \
          -t ${{ secrets.DOCKER_USERNAME }}/zero-downtime-api:${{ github.sha }} .

      - name: Push Latest Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/zero-downtime-api:latest

      - name: Push Version Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/zero-downtime-api:${{ github.sha }}