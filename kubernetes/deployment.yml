apiVersion: apps/v1
kind: Deployment

metadata:
  name: zero-downtime-api

spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  selector:
    matchLabels:
      app: zero-downtime-api

  template:
    metadata:
      labels:
        app: zero-downtime-api

    spec:
      containers:
      - name: zero-downtime-api

        image: dhanushs2k5/zero-downtime-api:v4
        imagePullPolicy: Always

        ports:
        - containerPort: 8080

        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20